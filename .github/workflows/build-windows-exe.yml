name: Build Windows Installer Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r windows_tool/requirements-windows.txt

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "ESI统计工具" `
            --paths . `
            --hidden-import windows_tool.esi_pipeline `
            --hidden-import analyze_2025_esi `
            --hidden-import generate_2025_esi_doc `
            --hidden-import generate_2025_esi_process_doc `
            --hidden-import generate_author_flow_doc `
            --hidden-import generate_esi_stats_workbook `
            windows_tool/esi_gui_app.py

          if (!(Test-Path "dist/ESI统计工具.exe")) {
            throw "PyInstaller did not produce dist/ESI统计工具.exe"
          }

      - name: Set package version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "0.1.${{ github.run_number }}"
          }
          "ESI_TOOL_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $portableDir = "release/ESI统计工具-portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item -Force "dist/ESI统计工具.exe" $portableDir
          Copy-Item -Force README.md "$portableDir/README.md"
          Compress-Archive -Path "$portableDir/*" -DestinationPath "release/ESI统计工具-portable.zip" -Force

      - name: Install 7-Zip
        shell: pwsh
        run: choco install 7zip --no-progress -y

      - name: Build installer package
        shell: pwsh
        run: |
          $sevenZipDir = Join-Path $env:ProgramFiles '7-Zip'
          if (!(Test-Path $sevenZipDir)) {
            $sevenZipDir = Join-Path ${env:ProgramFiles(x86)} '7-Zip'
          }
          $sevenZipExe = Join-Path $sevenZipDir '7z.exe'
          $sfxModule = Join-Path $sevenZipDir '7zS.sfx'
          if (!(Test-Path $sevenZipExe)) {
            throw "7z.exe not found"
          }
          if (!(Test-Path $sfxModule)) {
            throw "7zS.sfx not found"
          }

          $payloadDir = "release/installer_payload"
          New-Item -ItemType Directory -Force -Path $payloadDir | Out-Null
          Copy-Item -Force "dist/ESI统计工具.exe" "$payloadDir/ESI统计工具.exe"
          Copy-Item -Force "README.md" "$payloadDir/README.md"
          Copy-Item -Force "windows_tool/install.cmd" "$payloadDir/install.cmd"

          & $sevenZipExe a -t7z "release/installer_payload.7z" "$payloadDir\*" | Out-Null

          $sfxConfig = Get-Content "windows_tool/sfx_config.txt" -Raw -Encoding utf8
          [System.IO.File]::WriteAllText("release/sfx_config.txt", $sfxConfig, [System.Text.UTF8Encoding]::new($true))

          $sfxBytes = [System.IO.File]::ReadAllBytes($sfxModule)
          $configBytes = [System.IO.File]::ReadAllBytes("release/sfx_config.txt")
          $archiveBytes = [System.IO.File]::ReadAllBytes("release/installer_payload.7z")
          $outPath = "release/ESI统计工具-Setup.exe"

          $stream = [System.IO.File]::Create($outPath)
          try {
            $stream.Write($sfxBytes, 0, $sfxBytes.Length)
            $stream.Write($configBytes, 0, $configBytes.Length)
            $stream.Write($archiveBytes, 0, $archiveBytes.Length)
          } finally {
            $stream.Dispose()
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESI统计工具-installer
          path: release/ESI统计工具-Setup.exe

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESI统计工具-portable
          path: release/ESI统计工具-portable.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ESI统计工具-Setup.exe
            release/ESI统计工具-portable.zip
