name: Build Windows Installer Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r windows_tool/requirements-windows.txt

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "ESI-Tool" `
            --paths . `
            --hidden-import windows_tool.esi_pipeline `
            --hidden-import analyze_2025_esi `
            --hidden-import generate_2025_esi_doc `
            --hidden-import generate_2025_esi_process_doc `
            --hidden-import generate_author_flow_doc `
            --hidden-import generate_esi_stats_workbook `
            windows_tool/esi_gui_app.py

          if (!(Test-Path "dist/ESI-Tool.exe")) {
            throw "PyInstaller did not produce dist/ESI-Tool.exe"
          }

      - name: Set package version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "0.1.${{ github.run_number }}"
          }
          "ESI_TOOL_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $portableDir = "release/ESI-Tool-portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item -Force "dist/ESI-Tool.exe" $portableDir
          Copy-Item -Force README.md "$portableDir/README.md"
          Compress-Archive -Path "$portableDir/*" -DestinationPath "release/ESI-Tool-portable.zip" -Force

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Build installer package
        shell: pwsh
        run: |
          $nsisDir = Join-Path ${env:ProgramFiles(x86)} "NSIS"
          if (!(Test-Path $nsisDir)) {
            $nsisDir = Join-Path $env:ProgramFiles "NSIS"
          }
          $makensis = Join-Path $nsisDir "makensis.exe"
          if (!(Test-Path $makensis)) {
            throw "makensis.exe not found"
          }
          & $makensis /V4 "windows_tool/esi_installer.nsi"
          if (!(Test-Path "release/ESI-Tool-Setup.exe")) {
            throw "NSIS did not produce release/ESI-Tool-Setup.exe"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESI统计工具-installer
          path: release/ESI-Tool-Setup.exe

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESI统计工具-portable
          path: release/ESI-Tool-portable.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ESI-Tool-Setup.exe
            release/ESI-Tool-portable.zip
